<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Dashboard</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>

<body>

<div class="container mt-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Doctor Dashboard</h2>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>

  <!-- PROFILE -->
  <div class="card p-3 mb-4">
    <h4>My Profile</h4>
    <p><b>Name:</b> <span id="doctorName">Loading...</span></p>
    <p><b>Email:</b> <span id="doctorEmail">-</span></p>
    <p><b>Specialization:</b> <span id="doctorSpecialization">-</span></p>
  </div>

  <!-- APPOINTMENTS -->
  <div class="card p-3 mb-4">
    <h4>My Appointments</h4>

    <button class="btn btn-primary mb-3" onclick="refreshAppointments()">
      Refresh
    </button>

    <div id="doctorAppointments">
      <p>Loading appointments...</p>
    </div>
  </div>

</div>

<!-- IMPORTANT -->
<script src="script.js"></script>
<script src="doctor.js"></script>

</body>
</html>
