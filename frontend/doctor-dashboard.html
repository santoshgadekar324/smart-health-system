<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doctor Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>

<body>

<div class="container mt-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>👨‍⚕️ Doctor Dashboard</h2>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
  </div>

  <!-- PROFILE -->
  <div class="card p-3 mb-4">
    <h4>My Profile</h4>
    <p><b>Name:</b> <span id="doctorName">Loading...</span></p>
    <p><b>Email:</b> <span id="doctorEmail">-</span></p>
    <p><b>Specialization:</b> <span id="doctorSpecialization">-</span></p>
  </div>

  <!-- STATS -->
  <div class="row mb-4">

    <div class="col-md-3">
      <div class="card p-3 text-center">
        <h6>Total</h6>
        <h3 id="statTotal">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 text-center">
        <h6>Pending</h6>
        <h3 id="statPending">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 text-center">
        <h6>Approved</h6>
        <h3 id="statApproved">0</h3>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card p-3 text-center">
        <h6>Rejected</h6>
        <h3 id="statRejected">0</h3>
      </div>
    </div>

  </div>

  <!-- FILTER -->
  <div class="mb-3">
    <select class="form-select" onchange="filterAppointments(this.value)">
      <option value="">All</option>
      <option value="PENDING">Pending</option>
      <option value="APPROVED">Approved</option>
      <option value="REJECTED">Rejected</option>
      <option value="COMPLETED">Completed</option>
    </select>
  </div>

  <!-- APPOINTMENTS -->
  <div id="doctorAppointments">

    <p>Loading appointments...</p>

  </div>

</div>

<!-- JS -->
<script src="script.js"></script>
<script src="doctor.js"></script>

</body>
</html>
