<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Register</title>

  <!-- ✅ Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ✅ Your CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark">

<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4 shadow register-card">

    <h3 class="text-center mb-3">Patient Registration</h3>

    <form id="registerForm">

      <div class="mb-3">
        <label>Full Name</label>
        <input type="text" id="fullName" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Register</button>

    </form>

    <div id="msg" class="text-center mt-3"></div>

  </div>

</div>

<!-- ✅ JS -->
<link rel="stylesheet" href="style.css">
<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    fullName: document.getElementById("fullName").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: "PATIENT"
  };

  const res = await API.register(payload);

  if (res && res.token) {
    document.getElementById("msg").innerHTML = "✅ Registration Success";
    document.getElementById("msg").style.color = "#30d158";
  } else {
    document.getElementById("msg").innerHTML = "❌ Failed";
    document.getElementById("msg").style.color = "#ff5a7e";
  }
});
</script>
</body>
</html>
