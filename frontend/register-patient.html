<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Patient Register</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- YOUR CSS -->
  <link rel="stylesheet" href="/style.css">
</head>

<body>

<!-- 🔥 MAIN CONTAINER -->
<div class="register-container">

  <div class="register-box">

    <h2>Patient Registration</h2>

    <form id="registerForm">

      <input type="text" id="fullName" placeholder="Full Name" required>

      <input type="email" id="email" placeholder="Email" required>

      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Register</button>

    </form>

    <div id="msg" class="text-center mt-3"></div>

  </div>

</div>

<!-- ✅ JS -->
<script src="/script.js"></script>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    fullName: document.getElementById("fullName").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: "PATIENT"
  };

  const res = await API.register(payload);

  if (res && res.token) {
    document.getElementById("msg").innerHTML = "✅ Registration Success";
    document.getElementById("msg").style.color = "#30d158";
  } else {
    document.getElementById("msg").innerHTML = "❌ Failed";
    document.getElementById("msg").style.color = "#ff5a7e";
  }
});
</script>

</body>
</html>
