<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor Register</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="register-container">

  <div class="register-box">

    <h2>Doctor Registration</h2>

    <form id="doctorForm">

      <input type="text" id="fullName" placeholder="Full Name" required>

      <input type="email" id="email" placeholder="Email" required>

      <input type="password" id="password" placeholder="Password" required>

      <input type="text" id="specialization" placeholder="Specialization (REQUIRED)" required>

      <input type="text" id="qualification" placeholder="Qualification">

      <input type="number" id="experience" placeholder="Experience (years)">

      <button type="submit">Register</button>

    </form>

    <div id="msg" class="text-center mt-3"></div>

  </div>

</div>

<script src="/script.js"></script>

<script>
document.getElementById("doctorForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const payload = {
    fullName: document.getElementById("fullName").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: "DOCTOR",

    specialization: document.getElementById("specialization").value,
    qualification: document.getElementById("qualification").value,
    experienceYears: document.getElementById("experience").value
  };

  const res = await API.register(payload);

  if (res && res.token) {
    document.getElementById("msg").innerHTML = "✅ Doctor Registered";
    document.getElementById("msg").style.color = "#30d158";
  } else {
    document.getElementById("msg").innerHTML = "❌ Failed";
    document.getElementById("msg").style.color = "#ff5a7e";
  }
});
</script>

</body>
</html>
